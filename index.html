<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ganamos</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- META PIXEL -->
  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');

    fbq('init', '3222877481226419');
    fbq('track', 'PageView');
  </script>

  <!-- ANIMACION -->
  <style>
    @keyframes softPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .pulse-soft {
      animation: softPulse 1.8s ease-in-out infinite;
    }
  </style>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-black text-white font-sans">

  <!-- HERO -->
  <section class="min-h-screen flex flex-col items-center text-center px-6 pt-16 pb-10 relative overflow-hidden">

    <div class="absolute w-[500px] h-[500px] bg-purple-600 opacity-20 blur-3xl rounded-full top-0"></div>

    <div class="relative z-10 w-full max-w-md flex flex-col items-center">

      <!-- LOGO -->
      <div class="mb-6 text-5xl md:text-6xl font-extrabold tracking-wide drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]">
        G<span class="text-purple-500">♠</span>NAMOS
      </div>

      <!-- TITULO -->
      <h1 class="text-4xl md:text-6xl font-extrabold leading-tight text-center">
        <span class="block">Jugá con</span>
        <span class="block">confianza en</span>
        <span class="block text-purple-500">la mejor plataforma</span>
      </h1>

      <!-- BOTON -->
      <button onclick="goWhatsApp()" 
        class="mt-8 w-full flex justify-center items-center gap-3 py-4 bg-gradient-to-r from-purple-500 to-purple-700 rounded-full text-lg font-bold shadow-lg transition pulse-soft hover:scale-105">
        <i class="fab fa-whatsapp text-xl"></i>
        WHATSAPP →
      </button>

      <p class="mt-3 text-gray-400 text-sm">
        Escribinos y reclamá tu bono ahora
      </p>

      <!-- BONUS -->
      <div class="mt-10 w-full border border-purple-500 rounded-2xl p-6 text-center bg-[#0a0a0a] shadow-[0_0_30px_rgba(168,85,247,0.3)]">
        <p class="text-purple-400 text-xs tracking-widest">• PROMO ACTIVADA •</p>
        <h2 class="text-3xl font-extrabold mt-3">BONO 30% EXTRA</h2>
        <p class="text-gray-400 mt-2 text-sm">En tu primera carga y en estados</p>
      </div>

    </div>

  </section>

  <!-- SOCIAL PROOF -->
  <div id="noti" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 px-6 py-3 rounded-xl shadow-xl border border-zinc-700 text-sm">
    <span id="texto">Julián M. retiró <span class="text-purple-400 font-bold">$24.300 ARS</span></span>
  </div>

  <script>

    // 👉 WHATSAPP + PIXEL
    function goWhatsApp(){

      fbq('track','Purchase', {
        value: 1.00,
        currency: 'ARS'
      });

      setTimeout(()=>{
        window.location.href = "https://api.whatsapp.com/send?phone=5491173744879&text=Quiero%20saber%20mas%20sobre%20esto";
      }, 600);
    }

    // 👉 SOCIAL PROOF
    const nombres = ["Lucas","Martín","Sofía","Valentina","Franco","Micaela"];
    const montos = [200000,85000,43000,130000,157000,410000];

    setInterval(()=>{
      const n = nombres[Math.floor(Math.random()*nombres.length)];
      const m = montos[Math.floor(Math.random()*montos.length)];
      document.getElementById("texto").innerHTML =
        `${n} retiró <span class='text-purple-400 font-bold'>$${m.toLocaleString()} ARS</span>`;
    },4000);

  </script>

</body>
</html>
