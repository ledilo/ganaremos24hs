<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganamos</title>

  <!-- Meta Pixel -->
  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '3123193024735427');
    fbq('track', 'PageView');
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #5b1aa3;
      color: white;
      text-align: center;
    }

    .container { padding: 20px; }

    .verified {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .check {
      width: 22px;
      height: 22px;
      background: #00c853;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    .bonus-img {
      width: 340px;
      margin-top: 30px;
    }

    .cta { margin-top: 40px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #25D366;
      color: black;
      padding: 18px 32px;
      border-radius: 14px;
      font-weight: bold;
      text-decoration: none;
      font-size: 20px;
      box-shadow: 0 0 25px rgba(0,255,150,0.9);
      transition: transform 0.15s ease;
    }

    .btn:active { transform: scale(0.95); }

    .btn img { width: 24px; }

    .sub { margin-top: 12px; font-size: 14px; opacity: 0.9; }

    /* NOTIFICACIONES */
    .notif {
      position: fixed;
      bottom: 20px; /* pegado abajo como pediste */ /* más arriba, tipo toast real */
      left: 50%;
      transform: translateX(-50%);
      background: #1c1c1c;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      min-width: 260px;
      max-width: 90%;
      text-align: center;
      z-index: 9999;
    }

    .notif strong { color: #00e676; }

  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" width="200">

    <!-- VERIFICADO -->
    <div class="verified">
      PLATAFORMA VERIFICADA
      <div class="check">✔</div>
    </div>

    <!-- BONUS -->
    <img src="bonus.png" class="bonus-img">

    <!-- BOTON -->
    <div class="cta">
      <a class="btn" href="#" onclick="goWhatsApp()">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        Reclámalo ahora
      </a>

      <div class="sub">Pagos en el acto!</div>
    </div>

  </div>

  <!-- NOTIFICACION -->
  <div class="notif" id="notif"></div>

  <script>
    function goWhatsApp(){
      fbq('track','Lead');
      setTimeout(()=>{
        window.location.href = "https://wa.me/5491173744879?text=Quiero%20saber%20mas%20sobre%20esto";
      }, 800);
    }

    const mensajes = [
      "Julián retiró <strong>$763.300</strong> en Ruleta",
      "Martina ganó <strong>$120.000</strong> en Pragmatic",
      "Lucas retiró <strong>$95.000</strong> en Slots",
      "Sofía ganó <strong>$210.000</strong> en RubyPlay",
      "Diego retiró <strong>$180.000</strong> en Blackjack"
    ];

    function mostrarNotif() {
      const notif = document.getElementById('notif');
      notif.innerHTML = mensajes[Math.floor(Math.random()*mensajes.length)];
      notif.style.display = 'block';

      setTimeout(() => {
        notif.style.display = 'none';
      }, 4500);
    }

    // intervalo activo (no visible en pantalla)
    setInterval(mostrarNotif, 6000);
  </script>

</body>
</html>
